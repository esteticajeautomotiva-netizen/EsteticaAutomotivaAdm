<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J&E Estética Automotiva — Login</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#D4AF37">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="vars.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px;
       background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(212,175,55,0.12), transparent), var(--bg); }
.login-wrap { width:100%; max-width:400px; }
.login-logo { text-align:center; margin-bottom:36px; }
.login-logo .mark {
  background:linear-gradient(135deg,#D4AF37,#8B6914);
  box-shadow: 0 0 40px rgba(212,175,55,0.4);
  border-radius: 50%;
}
.login-logo h1 { font-family:var(--font-display); font-size:30px; font-weight:900; text-transform:uppercase; letter-spacing:2px; }
.login-logo p { color:var(--text-2); font-size:13px; margin-top:4px; }
.login-card { background:var(--card); border:1px solid var(--card-border); border-radius:var(--radius-xl); padding:32px; }
.login-card h2 { font-family:var(--font-display); font-size:22px; font-weight:800; text-transform:uppercase; margin-bottom:24px; }
.form-stack { display:flex; flex-direction:column; gap:16px; margin-bottom:20px; }
.forgot { text-align:right; font-size:12px; }
.forgot a { color:var(--cyan); text-decoration:none; }
.forgot a:hover { text-decoration:underline; }
.login-footer { text-align:center; margin-top:24px; font-size:12px; color:var(--text-2); }
.login-footer a { color:var(--cyan); text-decoration:none; }
#login-error { background:rgba(255,77,79,0.1); border:1px solid var(--danger); border-radius:var(--radius); padding:12px; font-size:13px; color:var(--danger); text-align:center; }
</style>
</head>
<body>
<div id="toast-container"></div>

<div class="login-wrap">
  <div class="login-logo">
    <div class="mark" style="width:88px;height:88px;border-radius:50%;overflow:hidden;margin:0 auto 14px;box-shadow:0 0 40px rgba(212,175,55,0.45);border:2px solid rgba(212,175,55,0.5);display:block">
      <img src="https://res.cloudinary.com/dmqtygmro/image/upload/v1778716782/WhatsApp_Image_2026-05-07_at_22.51.51_fac8lq.jpg" alt="J&E" style="width:100%;height:100%;object-fit:cover;display:block">
    </div>
    <h1>J&amp;E Estética</h1>
    <p>Plataforma de Agendamento Automotivo</p>
  </div>

  <div class="login-card">
    <h2>Entrar</h2>
    <div id="login-error" class="hidden"></div>
    <div class="form-stack">
      <div class="input-group">
        <label>E-mail</label>
        <input type="email" id="login-email" class="input" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="login-senha" class="input" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>
    <div class="forgot">
      <a href="#" onclick="doReset(); return false;">Esqueci a senha</a>
    </div>
    <br>
    <button class="btn btn-primary btn-block btn-lg" id="btn-login" onclick="doLogin()">
      Entrar
    </button>
  </div>

  <div class="login-footer">
    <a href="admin.html">← Voltar para o Painel ADM</a>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const btn = document.getElementById('btn-login');
const errEl = document.getElementById('login-error');

// Se já logado, redireciona
auth.onAuthStateChanged(async user => {
  if (!user) return;
  const doc = await db.collection('users').doc(user.uid).get();
  if (!doc.exists) { await auth.signOut(); return; }
  const role = doc.data().role;
  if (role === 'admin') window.location.href = 'admin.html';
  else if (role === 'specialist') window.location.href = 'specialist.html';
  else window.location.href = 'index.html';
});

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  errEl.classList.add('hidden');
  if (!email || !senha) { showErr('Preencha e-mail e senha'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Entrando...';
  try {
    const r = await auth.signInWithEmailAndPassword(email, senha);
    const doc = await db.collection('users').doc(r.user.uid).get();
    if (!doc.exists) throw new Error('Usuário sem perfil no sistema');
    const role = doc.data().role;
    if (role === 'admin') window.location.href = 'admin.html';
    else if (role === 'specialist') window.location.href = 'specialist.html';
    else window.location.href = 'index.html';
  } catch (e) {
    const msgs = { 'auth/user-not-found':'E-mail não encontrado', 'auth/wrong-password':'Senha incorreta',
                   'auth/invalid-email':'E-mail inválido', 'auth/too-many-requests':'Muitas tentativas. Aguarde.' };
    showErr(msgs[e.code] || e.message);
    btn.disabled = false;
    btn.innerHTML = 'Entrar';
  }
}

async function doReset() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showErr('Informe o e-mail para recuperação'); return; }
  await auth.sendPasswordResetEmail(email);
  showErr('E-mail de recuperação enviado! Verifique sua caixa.', true);
}

function showErr(msg, ok = false) {
  errEl.textContent = msg;
  errEl.style.background = ok ? 'rgba(16,232,144,0.1)' : 'rgba(255,77,79,0.1)';
  errEl.style.borderColor = ok ? 'var(--success)' : 'var(--danger)';
  errEl.style.color = ok ? 'var(--success)' : 'var(--danger)';
  errEl.classList.remove('hidden');
}

// Enter para logar
document.getElementById('login-senha').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// PWA
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
